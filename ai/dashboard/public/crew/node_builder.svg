<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#CFFAFE"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#155E75"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#0E749050"/></filter>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)"/>
  
  <!-- Circuit background pattern -->
  <g stroke="#06B6D4" stroke-width="1" fill="none" opacity="0.12">
    <path d="M60 80v40h50"/><circle cx="110" cy="120" r="3" fill="#06B6D4"/>
    <path d="M340 90h-40v30"/><circle cx="300" cy="120" r="3" fill="#06B6D4"/>
    <path d="M50 280h30v-40"/><circle cx="80" cy="240" r="3" fill="#06B6D4"/>
    <path d="M350 300h-50v-30"/><circle cx="300" cy="270" r="3" fill="#06B6D4"/>
    <path d="M140 40h60"/><path d="M200 360h80"/>
  </g>

  <!-- Platform -->
  <ellipse cx="200" cy="345" rx="110" ry="18" fill="#0E7490" opacity="0.25"/>
  
  <!-- === ROBOT BODY === -->
  <g filter="url(#shadow)">
    <!-- Legs -->
    <rect x="168" y="272" width="24" height="52" rx="12" fill="url(#metal)"/>
    <rect x="208" y="272" width="24" height="52" rx="12" fill="url(#metal)"/>
    <!-- Feet -->
    <ellipse cx="180" cy="326" rx="20" ry="12" fill="#0891B2"/>
    <ellipse cx="220" cy="326" rx="20" ry="12" fill="#0891B2"/>
    <!-- Foot detail -->
    <ellipse cx="180" cy="326" rx="12" ry="6" fill="#06B6D4"/>
    <ellipse cx="220" cy="326" rx="12" ry="6" fill="#06B6D4"/>

    <!-- Body -->
    <rect x="148" y="185" width="104" height="95" rx="22" fill="url(#metal)"/>
    <!-- Body highlight -->
    <rect x="155" y="192" width="90" height="30" rx="12" fill="white" opacity="0.15"/>
    
    <!-- Chest panel -->
    <rect x="172" y="205" width="56" height="45" rx="10" fill="url(#dark)"/>
    <!-- Screen content - gear icon -->
    <g transform="translate(200, 222)">
      <circle r="10" fill="none" stroke="#22D3EE" stroke-width="2"/>
      <circle r="4" fill="#22D3EE"/>
      <rect x="-3" y="-14" width="6" height="6" rx="1" fill="#22D3EE"/>
      <rect x="-3" y="8" width="6" height="6" rx="1" fill="#22D3EE"/>
      <rect x="-14" y="-3" width="6" height="6" rx="1" fill="#22D3EE"/>
      <rect x="8" y="-3" width="6" height="6" rx="1" fill="#22D3EE"/>
    </g>
    <text x="200" y="244" text-anchor="middle" fill="#67E8F9" font-family="monospace" font-size="7">NODE.BUILD</text>
    
    <!-- Belt -->
    <rect x="148" y="260" width="104" height="12" rx="4" fill="#0E7490"/>
    <circle cx="200" cy="266" r="5" fill="url(#orange)"/>

    <!-- Arms -->
    <!-- Left arm -->
    <rect x="125" y="198" width="25" height="14" rx="7" fill="#06B6D4"/>
    <rect x="112" y="210" width="18" height="45" rx="9" fill="url(#metal)"/>
    <!-- Left hand - wrench -->
    <g transform="translate(121, 265)">
      <rect x="-4" y="-5" width="8" height="20" rx="2" fill="url(#orange)"/>
      <circle cy="-8" r="8" fill="url(#orange)"/>
      <rect x="-3" y="-15" width="2.5" height="8" fill="#0C4A6E"/>
      <rect x="0.5" y="-15" width="2.5" height="8" fill="#0C4A6E"/>
    </g>
    
    <!-- Right arm -->
    <rect x="250" y="198" width="25" height="14" rx="7" fill="#06B6D4"/>
    <rect x="270" y="210" width="18" height="45" rx="9" fill="url(#metal)"/>
    <!-- Right hand - holding code block -->
    <g transform="translate(279, 258)">
      <rect x="-12" y="-5" width="24" height="20" rx="4" fill="url(#dark)"/>
      <text x="0" y="10" text-anchor="middle" fill="#22D3EE" font-family="monospace" font-size="9" font-weight="bold">&lt;/&gt;</text>
    </g>
  </g>

  <!-- === HEAD === -->
  <g filter="url(#shadow)">
    <!-- Head shape -->
    <rect x="157" y="100" width="86" height="82" rx="28" fill="url(#metal)"/>
    <!-- Head highlight -->
    <rect x="163" y="106" width="74" height="25" rx="15" fill="white" opacity="0.15"/>
    
    <!-- Face visor -->
    <rect x="165" y="118" width="70" height="42" rx="18" fill="url(#dark)"/>
    
    <!-- Eyes -->
    <!-- Left eye -->
    <circle cx="188" cy="140" r="13" fill="#164E63" stroke="#22D3EE" stroke-width="1.5"/>
    <circle cx="186" cy="137" r="7" fill="#22D3EE"/>
    <circle cx="184" cy="135" r="3" fill="white" opacity="0.9"/>
    <circle cx="190" cy="142" r="2" fill="#67E8F9" opacity="0.6"/>
    
    <!-- Right eye -->
    <circle cx="212" cy="140" r="13" fill="#164E63" stroke="#22D3EE" stroke-width="1.5"/>
    <circle cx="210" cy="137" r="7" fill="#22D3EE"/>
    <circle cx="208" cy="135" r="3" fill="white" opacity="0.9"/>
    <circle cx="214" cy="142" r="2" fill="#67E8F9" opacity="0.6"/>
    
    <!-- Happy smile -->
    <path d="M188 153 Q200 164 212 153" stroke="#22D3EE" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Cheeks (blush) -->
    <ellipse cx="173" cy="152" rx="6" ry="4" fill="#F59E0B" opacity="0.3"/>
    <ellipse cx="227" cy="152" rx="6" ry="4" fill="#F59E0B" opacity="0.3"/>
    
    <!-- Antenna -->
    <rect x="197" y="85" width="6" height="18" rx="3" fill="#0891B2"/>
    <circle cx="200" cy="82" r="9" fill="url(#orange)" filter="url(#glow)"/>
    <circle cx="200" cy="82" r="5" fill="#FDE68A"/>
    <circle cx="198" cy="80" r="2" fill="white" opacity="0.7"/>
    
    <!-- Ear bolts -->
    <circle cx="155" cy="135" r="7" fill="url(#orange)"/>
    <circle cx="155" cy="135" r="3.5" fill="#FDE68A"/>
    <circle cx="245" cy="135" r="7" fill="url(#orange)"/>
    <circle cx="245" cy="135" r="3.5" fill="#FDE68A"/>
  </g>
  
  <!-- Floating decorations -->
  <!-- Gear top-left -->
  <g transform="translate(82, 140)" filter="url(#glow)" opacity="0.7">
    <circle r="15" fill="url(#orange)"/>
    <circle r="6" fill="#FDE68A"/>
    <rect x="-4" y="-20" width="8" height="10" rx="2" fill="#F59E0B"/>
    <rect x="-4" y="10" width="8" height="10" rx="2" fill="#F59E0B"/>
    <rect x="-20" y="-4" width="10" height="8" rx="2" fill="#F59E0B"/>
    <rect x="10" y="-4" width="10" height="8" rx="2" fill="#F59E0B"/>
    <animateTransform attributeName="transform" type="rotate" from="0 82 140" to="360 82 140" dur="10s" repeatCount="indefinite"/>
  </g>
  
  <!-- Gear top-right -->
  <g transform="translate(325, 155)" filter="url(#glow)" opacity="0.5">
    <circle r="11" fill="url(#orange)"/>
    <circle r="4.5" fill="#FDE68A"/>
    <rect x="-3" y="-15" width="6" height="8" rx="2" fill="#F59E0B"/>
    <rect x="-3" y="7" width="6" height="8" rx="2" fill="#F59E0B"/>
    <rect x="-15" y="-3" width="8" height="6" rx="2" fill="#F59E0B"/>
    <rect x="7" y="-3" width="8" height="6" rx="2" fill="#F59E0B"/>
    <animateTransform attributeName="transform" type="rotate" from="360 325 155" to="0 325 155" dur="8s" repeatCount="indefinite"/>
  </g>

  <!-- Small gear bottom-right -->
  <g transform="translate(320, 280)" filter="url(#glow)" opacity="0.4">
    <circle r="8" fill="url(#orange)"/>
    <circle r="3" fill="#FDE68A"/>
    <animateTransform attributeName="transform" type="rotate" from="0 320 280" to="360 320 280" dur="6s" repeatCount="indefinite"/>
  </g>
  
  <!-- Code symbols floating -->
  <text x="65" y="230" fill="#06B6D4" font-family="monospace" font-size="16" opacity="0.3" font-weight="bold">{  }</text>
  <text x="320" y="120" fill="#06B6D4" font-family="monospace" font-size="13" opacity="0.25">( )</text>
  <text x="80" y="300" fill="#06B6D4" font-family="monospace" font-size="12" opacity="0.2">fn()</text>
  
  <!-- Sparkles -->
  <g fill="#FDE68A">
    <circle cx="100" cy="100" r="2.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="95" r="2"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="240" r="2"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="75" cy="170" r="1.5"><animate attributeName="opacity" values="0.4;0;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
  </g>
  
  <!-- Name badge at bottom -->
  <g transform="translate(200, 375)">
    <rect x="-45" y="-12" width="90" height="22" rx="11" fill="#0E7490" opacity="0.15"/>
    <text x="0" y="4" text-anchor="middle" fill="#0891B2" font-family="monospace" font-size="10" font-weight="bold" letter-spacing="2">NODE BUILDER</text>
  </g>
</svg>
